# version: "3.7"

x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "2"

services:
  web:
    build:
      context: ./
      args:
        MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
        TIOJ_KEY: $FETCH_KEY
    environment:
      - RAILS_ENV=production
      - SMTP_USERNAME
      - SMTP_PASSWORD
      - SMTP_PORT
      - SMTP_ADDRESS
      - MAIL_HOSTNAME
      - MAIL_SENDER
    volumes:
      - web-td:/tioj/td
      - web-log:/tioj/log
      - web-public:/tioj/public
      # - .:/tioj
    depends_on:
      - db
    networks:
      - app
    ports:
      - "4000:4000"
    logging: *default-logging
    restart: always
  db:
    image: mysql:8.0
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=tioj_production
    networks:
      - app
    ports:
      - "3306:3306"
    logging: *default-logging
    restart: always
  judge:
    build: https://github.com/TIOJ-INFOR-Online-Judge/tioj-judge.git#2d556b40d8b88e41319423f6bd3116e7c0924375
    environment:
      TIOJ_URL: "http://localhost:4000"
      TIOJ_KEY: $FETCH_KEY
    volumes:
      - /srv/tioj/judge-td-pool:/var/lib/tioj-judge/td-pool
      - /srv/tioj/judge-testdata:/var/lib/tioj-judge/testdata
    tmpfs:
      - /tmp:exec
    privileged: true
    network_mode: host
    pid: host
    logging: *default-logging
    restart: always
    profiles:
      - donotstart
  dufs:
    image: sigoden/dufs
    container_name: dufs
    ports:
    - 5001:5000
    volumes:
    - web-public:/data
    networks:
      - app
    command: /data --allow-upload -a admin:$FILE_UPLOAD_PASSWORD@/:rw -b 0.0.0.0
    restart: always

volumes:
  db-data:
  web-td:
  web-log:
  web-public:

networks:
  app:
